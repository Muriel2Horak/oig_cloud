# SonarCloud Configuration for PR #163
# Excludes test files from duplication and security hotspot analysis

# Source and test paths
sonar.sources=custom_components/oig_cloud
sonar.tests=tests,custom_components/oig_cloud/www_v2/tests

# Exclude tests from duplication analysis (test boilerplate inflates metrics)
sonar.cpd.exclusions=tests/**,custom_components/oig_cloud/www_v2/tests/**

# Test file inclusions for coverage
sonar.test.inclusions=tests/**,custom_components/oig_cloud/www_v2/tests/**

# Exclude test files from security hotspot analysis (false positives on test data)
sonar.security.exclusions.paths=tests/**,custom_components/oig_cloud/www_v2/tests/**

# TypeScript source for www_v2
sonar.typescript.lcov.reportPaths=custom_components/oig_cloud/www_v2/coverage/lcov.info
