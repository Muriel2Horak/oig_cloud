name: Pre-commit

on:
  push:
    branches:
      - main
      - temp
  pull_request:

jobs:
  pre-commit-check:
    name: Pre-commit Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit flake8 isort black mypy pydocstyle pylint bandit

      - name: Run pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure || echo "pre-commit checks failed"
