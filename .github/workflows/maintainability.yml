name: Maintainability

on:
  push:
    branches:
      - main
      - temp
  pull_request:

jobs:
  radon:
    name: Code Complexity
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install radon

      - name: Run Radon
        run: |
          radon cc custom_components/oig_cloud -a -s > radon-report.txt

      - name: Upload Radon report
        uses: actions/upload-artifact@v4
        with:
          name: radon-report
          path: radon-report.txt

  vulture:
    name: Dead Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install vulture

      - name: Run Vulture
        run: |
          vulture custom_components/oig_cloud --min-confidence 90 > vulture-report.txt || true

      - name: Upload Vulture report
        uses: actions/upload-artifact@v4
        with:
          name: vulture-report
          path: vulture-report.txt
