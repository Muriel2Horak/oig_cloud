set_box_mode:
  name: Set BatteryBox Mode
  description: |
    Set the mode of the device.
    Please note upon successfully calling the service, it usually takes up to 10 minutes for the changes to be reflected
    in the BBox and the UI, but occasionally may take up to an hour.
    You can check whether the call was successful in the OIG web or mobile app in the Notifications section.
  fields:
    device_id:
      description: The ČEZ Battery Box device to control (required only if you have multiple devices)
      required: false
      selector:
        device:
          filter:
            - integration: oig_cloud
              manufacturer: OIG
              model: ČEZ Battery Box Home
    mode:
      description: The mode to set
      required: false
      selector:
        select:
          translation_key: box_mode
          options:
            - home_1
            - home_2
            - home_3
            - home_ups
    home_grid_v:
      description: Enable Home Grid V supplementary mode
      required: false
      selector:
        boolean:
    home_grid_vi:
      description: Enable Home Grid VI supplementary mode
      required: false
      selector:
        boolean:
    acknowledgement:
      description: |
        I acknowledge that calling the service will result in parameter modification of a live system.
        I take on full responsibility for the changes and any effect they may have, expected or otherwise.
        Beru na vědomí, že volání této služby povede ke změně parametrů živého systému.
        Přebírám plnou odpovědnost za změny a jakýkoli jejich účinek, očekávaný nebo neočekávaný a to i v případě chyby.
      required: true
      selector:
        boolean:

set_grid_delivery:
  name: Nastavení přetoků
  description: |
    Povolení nebo zakázání přetoků do distribuční sítě. Přetoky je možné zcela vypnout, zapnout, nebo zapnut s limitem.
    K použití této funkce musí být nainstalován odpovídající firmware a může trvat delší dobu, než se nastavení projeví.

    NOVÁ VERZE (automatická serializace):
    Můžete nyní nastavit režim a limit v JEDNOM volání služby. Shield automaticky serializuje změny:
    1. Nejdřív se změní režim (pokud je potřeba)
    2. Pak se změní limit (pokud je potřeba)
    3. Každá změna má vlastní záznam v logbooku

    Příklad: {mode: "S omezením / Limited", limit: 5000} - nastaví OBĚ parametry postupně.

    ZPĚTNÁ KOMPATIBILITA:
    Stále můžete volat službu 2× samostatně:
    1. Nejprve {mode: "S omezením / Limited"}
    2. Pak {limit: 5000}

    Více informací: https://raw.githubusercontent.com/psimsa/oig_cloud/main/docs/grid_delivery_script_sample.yaml
  fields:
    device_id:
      description: The ČEZ Battery Box device to control (required only if you have multiple devices)
      required: false
      selector:
        device:
          filter:
            - integration: oig_cloud
              manufacturer: OIG
              model: ČEZ Battery Box Home
    mode:
      description: Režim přetoků
      selector:
        select:
          translation_key: grid_delivery_mode
          options:
            - "off"
            - "on"
            - "limited"
    limit:
      description: Nastavení limitu výkonu přetoků (W)
      selector:
        number:
          min: 1
          max: 9999
          unit_of_measurement: "W"
    acknowledgement:
      description: |
        I acknowledge that calling the service will result in parameter modification of a live system.
        I take on full responsibility for the changes and any effect they may have, expected or otherwise.
        Beru na vědomí, že volání této služby povede ke změně parametrů živého systému.
        Přebírám plnou odpovědnost za změny a jakýkoli jejich účinek, očekávaný nebo neočekávaný a to i v případě chyby.
      required: true
      selector:
        boolean:
    warning:
      description: |
        Před použitím této funkce se seznamte s omezeními dostupnými v aplikaci OIG Power / ČEZ Battery Box.
        AKTIVACÍ PŘETOKŮ NA ZAŘÍZENÍ BATTERY BOX BERETE NA VĚDOMÍ NÍŽE UVEDENÉ A PŘEBÍRÁTE NA SEBE
        PLNOU ZODPOVĚDNOST ZA PŘÍPADNÉ SANKCE PORUŠENÍ PPDS. JAKO VÝROBCE ZAŘÍZENÍ BATTERY BOX
        NEJSME ZODPOVĚDNI ZA TAKOVÉ JEDNÁNÍ Z VAŠÍ STRANY.
        Povolením přetoků BATTERY BOX umožňuje posílat přebytky z výroby do distribuční sítě (DS). Nadvýroba vzniká
        v případě, kdy elektrárna vyrábí, v objektu již došlo k uspokojení veškeré zátěže a BATTERY BOX má nabité
        baterie. Dle Pravidel provozování distribučních soustav (dále PPDS) je možné posílat do DS přebytky energie
        pouze pokud **máte dle Smlouvy o připojení (SoP) tento stav schválen provozovatelem DS** odpovídající skutečnému
        výkonu FVE, již došlo k **Prvnímu paralelnímu připojení** (dále jen PPP) a obdrželi jste Protokol o PPP.
        Jako majitel zařízení BATTERY BOX máte možnost sám aktivovat nebo deaktivovat povolení přetoků. Pokud
        byste provedli povolení přetoků dříve, než povolují PPDS, hrozí Vám ze strany provozovatele DS udělení pokuty
        dle platného ceníku. Data o aktivaci přetoků zařízení samo automaticky archivuje, je proto možné vždy doložit,
        kdy byl na zařízení takový příkaz zadán. V případě, že již máte platné povolení pro dodávky přetoků do DS
        a rozhodli jste se navýšit dodatečně výkon Vaší FVE, jste povinni zajistit si od provozovatele DS nové SoP
        a PPP, odpovídající navýšenému výkonu. Do té doby nejste oprávněni posílat přebytek z navýšeného výkonu do DS
        s rizikem pokuty od provozovatele DS. Plné znění tohoto upozornění naleznete na
        https://drive.google.com/viewerng/viewer?embedded=true&url=https://portal.oigpower.cz/pretoky-sankce.pdf
      required: true
      selector:
        boolean:

set_boiler_mode:
  name: Nastavení manuálního nabíjení bojleru
  description: |
    Tímto parametrem obejdete nastavení CBB ohledně řízení přetoků do bojleru a výkon patrony je v plném režimu
    bez ohledu na HDO a nebo výrobu FVE. Defaultně je SSR, kdy si plně CBB řídí nabíjení bojleru podle HDO a přetoků.
    Nastavení Manual všechno toto obchází.
  fields:
    device_id:
      description: The ČEZ Battery Box device to control (required only if you have multiple devices)
      required: false
      selector:
        device:
          filter:
            - integration: oig_cloud
              manufacturer: OIG
              model: ČEZ Battery Box Home
    mode:
      description: Režim bojleru
      selector:
        select:
          translation_key: boiler_mode
          options:
            - cbb
            - manual
    acknowledgement:
      description: |
        I acknowledge that calling the service will result in parameter modification of a live system.
        I take on full responsibility for the changes and any effect they may have, expected or otherwise.
        Beru na vědomí, že volání této služby povede ke změně parametrů živého systému.
        Přebírám plnou odpovědnost za změny a jakýkoli jejich účinek, očekávaný nebo neočekávaný a to i v případě chyby.
      required: true
      selector:
        boolean:

set_formating_mode:
  name: Nabíjení baterie z GRIDU
  description: |
    Tímto parametrem nastavujete okamžité spuštění nabíjení baterige ze sítě na stanovenou hodnotu limitu.
  fields:
    device_id:
      description: The ČEZ Battery Box device to control (required only if you have multiple devices)
      required: false
      selector:
        device:
          filter:
            - integration: oig_cloud
              manufacturer: OIG
              model: ČEZ Battery Box Home
    mode:
      description: Režim nabíjení
      selector:
        select:
          translation_key: battery_charge_mode
          options:
            - no_charge
            - charge
    limit:
      description: Cílové procento nabití
      selector:
        number:
          min: 25
          max: 100
          unit_of_measurement: "%"
    acknowledgement:
      description: |
        I acknowledge that calling the service will result in parameter modification of a live system.
        I take on full responsibility for the changes and any effect they may have, expected or otherwise.
        Beru na vědomí, že volání této služby povede ke změně parametrů živého systému.
        Přebírám plnou odpovědnost za změny a jakýkoli jejich účinek, očekávaný nebo neočekávaný a to i v případě chyby.
      required: true
      selector:
        boolean:

# Solar forecast služby pro ladění
update_solar_forecast:
  name: "🌞 Aktualizovat Solar Forecast"
  description: "Manuálně aktualizuje data solární předpovědi z vybraného poskytovatele (Forecast.Solar/Solcast). Lze použít kdykoliv bez ohledu na nastavený interval."
  fields:
    entity_id:
      name: "Solar Forecast Entity"
      description: "Konkrétní solar forecast senzor k aktualizaci (volitelné - pokud neuvedete, aktualizují se všechny OIG entry)"
      required: false
      example: "sensor.oig_2206237016_solar_forecast"
      selector:
        entity:
          filter:
            integration: oig_cloud
            domain: sensor

# Dashboard tiles persistence
save_dashboard_tiles:
  name: "💾 Uložit konfiguraci dlaždic"
  description: |
    Uloží konfiguraci vlastních dlaždic z OIG Dashboard do integrace.
    Používá se automaticky dashboardem pro synchronizaci mezi prohlížeči/zařízeními.
    Můžete volat i manuálně pro zálohu konfigurace.
  fields:
    config:
      name: "Konfigurace dlaždic"
      description: "JSON string s konfigurací dlaždic (tiles_left, tiles_right, counts, visibility)"
      required: true
      example: '{"tiles_left": [], "tiles_right": [], "left_count": 6, "right_count": 6, "visible": true, "version": 1}'
      selector:
        text:
          multiline: true

get_dashboard_tiles:
  name: "📥 Načíst konfiguraci dlaždic"
  description: |
    Načte uloženou konfiguraci vlastních dlaždic z integrace.
    Používá se automaticky dashboardem při inicializaci pro synchronizaci mezi prohlížeči/zařízeními.
  # Poznámka: služba vrací odpověď (supports_response=True), ale services.yaml nepopisuje response schema.

plan_boiler_heating:
  name: "🔥 Naplánovat ohřev bojleru"
  description: |
    Vytvoří plán optimálního ohřevu bojleru na základě spotových cen elektřiny.
    Vybere nejlevnější časové sloty před deadlinem.
  fields:
    force:
      description: "Vynutit přepočet plánu i když existuje platný plán"
      required: false
      default: false
      selector:
        boolean:
    deadline:
      description: "Přepsat deadline (formát HH:MM, např. 20:00)"
      required: false
      example: "20:00"
      selector:
        text:

apply_boiler_plan:
  name: "🔥 Aplikovat plán ohřevu"
  description: |
    Aplikuje naplánovaný ohřev bojleru.
    Vytvoří automatizace pro zapínání topného tělesa v naplánovaných slotech.

cancel_boiler_plan:
  name: "🔥 Zrušit plán ohřevu"
  description: |
    Zruší aktivní plán ohřevu bojleru a odstraní naplánované automatizace.
